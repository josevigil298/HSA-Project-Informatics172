<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Jose Vigil">
    <meta name="description" content="Module Completion - HSANext">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your Custom CSS -->
    <link href="../css/Modules.css" rel="stylesheet">

    <title>Module Completed - HSANext</title>
</head>

<body>

    <!-- Navbar -->
    <nav class = "navbar navbar-expand-lg navbar-dark fixed-top">
        <div class = "container">
            <a class="navbar-brand fw-bold" href="../index.html">HSANext</a>
        </div>
    </nav>

    <div class="container module-container">
        <div class="d-flex align-items-center mb-5">

            <a href="javascript:history.back()" class="btn btn-back me-4">
                ← Back
            </a>

            <div class="step-progress flex-grow-1">

                <div class="step active">
                    <div class="circle">1</div>
                </div>

                <div class="line completed"></div>

                <div class="step active">
                    <div class="circle">2</div>
                </div>

                <div class="line completed"></div>

                <div class="step active">
                    <div class="circle">3</div>
                </div>

            </div>

        </div>

    </div>

    <div class="completion-wrapper">

        <div class="completion-card text-center">

            <div class="completion-icon">
                ✓
            </div>

            <h4 class="fw-semibold mt-4">
                Modules completed!
            </h4>

            <p class="text-muted">
                Next: personal questionnaire
            </p>

            <a href="personal-questions/Personal-Questionnaire-Q1.html" class="btn btn-primary mt-3">
                Continue
            </a>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name = "author" content = "Jose Vigil">
        <meta name = "description" content = "Educational Module 1">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href = "../../css/Modules.css" rel = "stylesheet">
        <title>Educational Module 1 - HSANext</title>
    </head>
    <body>
        <nav class = "navbar navbar-expand-lg navbar-dark fixed-top">
            <div class = "container">
                <a class="navbar-brand fw-bold" href="../../index.html">HSANext</a>
            </div>
        </nav>

        <div class="container module-container">
            <div class="d-flex align-items-center mb-5">

                <!-- Back Button -->
                <a href="javascript:history.back()" class="btn btn-back me-4">
                    ← Back
                </a>
            
                <!-- Step Progress -->
                <div class="step-progress flex-grow-1">
                    <div class="step active">
                        <div class="circle">1</div>
                    </div>
                    
                    <div class="line completed"></div>
                    
                    <div class="step active">
                        <div class="circle">2</div>
                    </div>
                    
                    <div class="line completed"></div>
                    
                    <div class="step">
                        <div class="circle">3</div>
                    </div>
                </div>
            
            </div>
            <!-- Title Section -->

            <div class="card comprehension-card shadow-sm mb-5">

                <!-- Green Header -->
                <div class="comprehension-header">
                    Comprehension Check:
                </div>
            
                <div class="p-4">
            
                    <!-- QUESTION 1 -->
                    <div class="question-block mb-5">
                        <p class="question-label">QUESTION 1</p>
                        <p class="question-text">
                            True or False: Can you be dependent on your parents health insurance plan?
                        </p>
            
                        <div class="d-grid gap-2">
                            <button class="btn btn-outline-primary option" data-correct="false">True, you can be listed as a dependent.</button>
                            <button class="btn btn-outline-primary option" data-correct="true">False, you cannot be listed as a dependent.</button>
                        </div>
            
                        <div class="feedback mt-3 fw-bold"></div>
            
                        <div class="text-end mt-3">
                            <button class="btn btn-check-answer">Check Answer</button>
                        </div>
                    </div>
            
                    <!-- QUESTION 2 -->
                    <div class="question-block mb-5">
                        <p class="question-label">QUESTION 2</p>
                        <p class="question-text">
                            Which of the following plans can you be on in order to open an HSA account?
                        </p>
            
                        <div class="d-grid gap-2">
                            <button class="btn btn-outline-primary option" data-correct="false">
                                PPO
                            </button>
                            <button class="btn btn-outline-primary option" data-correct="false">
                                HMO
                            </button>
                            <button class="btn btn-outline-primary option" data-correct="true">
                                HDHP
                            </button>
                        </div>
            
                        <div class="feedback mt-3 fw-bold"></div>
            
                        <div class="text-end mt-3">
                            <button class="btn btn-check-answer">Check Answer</button>
                        </div>
                    </div>
            
                </div>
            </div>

            <div class="text-end mb-5">
                <a href="../Module-Education/Module_3.html" class="btn btn-next">
                    Next →
                </a>
            </div>

        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="../../js/quiz-logic.js"></script>
    </body>
</html>
